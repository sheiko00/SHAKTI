<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHAKTI — Ritual</title>

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&family=Cairo&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  color:#fff;
  font-family:Inter;
  overflow-x:hidden;
}
body[dir="rtl"]{font-family:Cairo}

/* VIDEO */
video{position:fixed;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;width:100%;height:100%;background:#0008;z-index:-1}

/* INTRO */
.intro{
  position:fixed;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:#000;
  z-index:9999;
  cursor:pointer;
  font-family:'Playfair Display';
  font-size:24px;
  letter-spacing:6px;
}
.intro.hide{opacity:0;pointer-events:none}

/* LOGO */
.logo-wrap{
  position:relative;
  margin-bottom:20px;
  transition:.5s;
  z-index:1000;
}

.logo-wrap.small{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%) scale(.5);
  opacity:.7;
}

.logo{
  width:200px;
  display:block;
  opacity:1;
  transition:0.4s;
  animation:logoReveal 1.8s ease forwards;
}

/* 🔥 GLOW EFFECT */
.logo:hover{
  filter:drop-shadow(0 0 15px rgba(212,175,55,0.8))
         drop-shadow(0 0 30px rgba(212,175,55,0.5));
  transform:scale(1.05);
}

@keyframes logoReveal{
  from{opacity:0;transform:scale(.6)}
  to{opacity:1;transform:scale(1)}
}

/* TEXT */
h1{
  font-family:'Playfair Display';
  font-size:44px;
  letter-spacing:5px;
}
.tag{opacity:.7;margin-top:10px}

/* SECTION */
section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  z-index:1;
}

/* EMAIL */
.box{
  background:#ffffff10;
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(8px);
}

input{
  width:100%;
  padding:12px;
  border-radius:20px;
  border:none;
  margin-top:15px;
}

button{
  width:100%;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#d4af37;
  color:#000;
  margin-top:10px;
}

/* SOCIAL */
.social{
  position:fixed;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  z-index:3000;
}

.social a{
  display:block;
  margin:12px 0;
  width:45px;height:45px;
  border-radius:50%;
  background:#ffffff15;
  display:flex;align-items:center;justify-content:center;
}

.social svg{
  fill:#d4af37;
  width:22px;
  height:22px;
}

/* CONTROLS */
.ctrl{
  position:fixed;
  top:15px;
  right:15px;
  z-index:3000;
}

.ctrl button{
  width:38px;height:38px;
  border-radius:50%;
  background:#d4af37;
  color:#000;
  border:none;
  margin-left:5px;
  cursor:pointer;
}

/* MAIL */
.mail{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  padding:10px 16px;
  border-radius:25px;
  color:#000;
  text-decoration:none;
  z-index:3000;
}

/* LIGHT */
.light{
  position:fixed;
  width:180px;height:180px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,.2),transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  opacity:0;
  z-index:2000;
}

/* REVEAL */
.reveal{opacity:0;transform:translateY(30px);transition:1s}
.reveal.show{opacity:1;transform:translateY(0)}
</style>

</head>

<body>

<div class="intro" id="intro">TAP TO BEGIN</div>

<div class="ctrl">
<button id="mute">🔊</button>
<button id="lang">EN</button>
</div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<video autoplay muted loop><source src="video.mp4"></video>

<div class="overlay"></div>

<section>
<div class="reveal">
<div class="logo-wrap" id="logoWrap">
<img src="shakti_logo_clean_glow.png" class="logo">
</div>
<h1>SHAKTI</h1>
<p class="tag" id="tag">COMING SOON — THE RITUAL BEGINS</p>
</div>
</section>

<section>
<div class="box reveal">
<h2 id="join">Join the Ritual</h2>
<input id="mailInput" placeholder="Enter your email">
<button id="btn">Request Access</button>
</div>
</section>

<!-- SOCIAL -->

<div class="social">

<!-- YouTube -->
<a href="https://www.youtube.com/@SHAKTIBEAUTY" target="_blank">
<svg viewBox="0 0 24 24">
<path d="M23.498 6.186a2.997 2.997 0 0 0-2.109-2.122C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.389.564A2.997 2.997 0 0 0 .502 6.186A31.29 31.29 0 0 0 0 12a31.29 31.29 0 0 0 .502 5.814 2.997 2.997 0 0 0 2.109 2.122C4.495 20.5 12 20.5 12 20.5s7.505 0 9.389-.564a2.997 2.997 0 0 0 2.109-2.122A31.29 31.29 0 0 0 24 12a31.29 31.29 0 0 0-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
</svg>
</a>

<!-- X -->
<a href="https://x.com/SHAKTI_BEAUTY" target="_blank">
<svg viewBox="0 0 24 24">
<path d="M18.901 1.153h3.68l-8.04 9.2 9.46 12.647h-7.406l-5.805-7.67-6.713 7.67H.398l8.6-9.834L0 1.153h7.594l5.243 6.932 6.064-6.932z"/>
</svg>
</a>

<!-- Instagram -->
<a href="https://www.instagram.com/shaktibeauty.co" target="_blank">
<svg viewBox="0 0 24 24">
<path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 
5-5V7c0-2.757-2.243-5-5-5H7zm5 5a5 5 0 110 10 5 5 0 010-10zm6.5-.5a1.5 
1.5 0 110 3 1.5 1.5 0 010-3z"/>
</svg>

3.6-3.7 1.04 0 2.12.18 2.12.18v2.33h-1.2c-1.18 0-1.55.73-1.55 
1.48V12h2.64l-.42 2.88h-2.22v6.99A10 10 0 0022 12z"/>
</svg>
</a>

</div>

<a href="mailto:hello@shakti.beauty" class="mail">Email</a>

<script>

// LIGHT
const light=document.createElement('div')
light.className='light'
document.body.appendChild(light)

document.onmousemove=e=>{
  light.style.opacity=1
  light.style.left=e.clientX+'px'
  light.style.top=e.clientY+'px'
}

// INTRO
intro.onclick=()=>{
  intro.classList.add('hide')

  setTimeout(()=>{intro.style.display="none"},800)

  ambient.volume=.3
  ambient.play()

  setTimeout(()=>whisper.play(),700)
}

// FLOAT LOGO
window.onscroll=()=>{
  if(scrollY>100) logoWrap.classList.add('small')
  else logoWrap.classList.remove('small')
}

// REVEAL
const obs=new IntersectionObserver(e=>{
  e.forEach(el=>{if(el.isIntersecting)el.target.classList.add('show')})
})
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el))

// MUTE
let m=false
mute.onclick=()=>{
  m=!m
  ambient.muted=m
  whisper.muted=m
  mute.innerText=m?'🔇':'🔊'
}

// LANG
let l='en'
lang.onclick=()=>{
  l=l==='en'?'ar':'en'
  tag.innerText=l==='en'?'COMING SOON — THE RITUAL BEGINS':'قريباً — الطقس يبدأ'
  join.innerText=l==='en'?'Join the Ritual':'انضم الآن'
  btn.innerText=l==='en'?'Request Access':'اطلب الوصول'
  mailInput.placeholder=l==='en'?'Enter your email':'أدخل بريدك'
  document.body.dir=l==='ar'?'rtl':'ltr'
}

</script>

</body>
</html>
