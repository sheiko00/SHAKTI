<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAKTI — Ritual of Radiance</title>

<link rel="preload" as="video" href="video.mp4">
<link rel="preload" as="image" href="shakti_logo_clean_glow.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* INTRO */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  cursor:pointer;
  transition:1s;
}
.touch-intro.hide{opacity:0;pointer-events:none}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
  z-index:-1;
}

/* FLOATING LOGO */
.logo-wrap{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  transition:all 0.6s ease;
  z-index:100;
}

.logo-wrap.small{
  top:20px;
  left:50%;
  transform:translateX(-50%) scale(0.5);
}

.logo{
  width:220px;
  opacity:0;
  transform:scale(0.7);
  filter:blur(10px);
  animation:logoReveal 2.5s ease forwards, pulse 6s ease-in-out infinite 2.5s;
}

@keyframes logoReveal{
  0%{opacity:0;transform:scale(0.7);filter:blur(10px)}
  50%{opacity:1;transform:scale(1.05);filter:blur(2px)}
  100%{opacity:1;transform:scale(1);filter:blur(0)}
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.03)}
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(50px);
  transition:all 1.4s ease;
}
.reveal.show{
  opacity:1;
  transform:translateY(0);
}

/* SECTIONS */
section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* EMAIL BOX */
.email-box{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  max-width:350px;
}

input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  margin-top:20px;
}

button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#d4af37;
  color:#000;
  margin-top:10px;
  font-weight:bold;
}

/* SOCIAL */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.social-bar a{
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.social-bar svg{
  width:20px;
  height:20px;
  fill:#d4af37;
}

.social-bar a:hover{
  transform:scale(1.2);
  box-shadow:0 0 15px rgba(212,175,55,0.6);
}

/* SOUND */
.sound-toggle{
  position:fixed;
  top:20px;
  right:80px;
  width:38px;
  height:38px;
  border-radius:50%;
  background:rgba(212,175,55,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#d4af37;
}

/* LANGUAGE */
.lang-switcher{
  position:fixed;
  top:20px;
  right:20px;
  color:#d4af37;
}

/* BUTTON */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 18px;
  border-radius:40px;
  background:#d4af37;
  color:#000;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="touch-intro" id="intro">Tap to Begin</div>

<div class="lang-switcher">EN</div>
<div class="sound-toggle" id="soundToggle">🔊</div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<video autoplay muted loop playsinline preload="metadata">
  <source src="video.mp4">
</video>

<div class="overlay"></div>

<!-- FLOATING LOGO -->

<div class="logo-wrap" id="logoWrap">
  <img src="shakti_logo_clean_glow.png" class="logo">
</div>

<section>
  <div class="reveal">
    <h1>SHAKTI</h1>
    <p>COMING SOON — THE RITUAL BEGINS</p>
  </div>
</section>

<section>
  <div class="email-box reveal">
    <h2>Join the Ritual</h2>
    <input type="email" placeholder="Enter your email">
    <button>Request Access</button>
  </div>
</section>

<div class="social-bar">
<a href="#"><svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M18.9 2H22l-7.5 8.6..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1..."/></svg></a>
</div>

<script>

// INTRO
intro.onclick = intro.ontouchstart = ()=>{
  intro.classList.add('hide');
  ambient.play().catch(()=>{});
  whisper.play().catch(()=>{});
};

// REVEAL
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('show');
  });
},{threshold:0.2});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

// FLOATING LOGO
window.addEventListener('scroll', ()=>{
  if(window.scrollY > 100){
    logoWrap.classList.add('small');
  }else{
    logoWrap.classList.remove('small');
  }
});

// MUTE
let muted=false;
soundToggle.onclick=()=>{
  muted=!muted;
  ambient.muted=muted;
  whisper.muted=muted;
  soundToggle.innerText=muted?'🔇':'🔊';
};

</script>

</body>
</html>
