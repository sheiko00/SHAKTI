<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:#fff;background:#000;overflow:hidden}

/* VIDEO */
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;width:100%;height:100%;background:linear-gradient(to bottom, rgba(0,0,0,0.3), #000);z-index:-1}

/* INTRO */
.intro{position:fixed;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999}
.intro img{width:260px;animation:introAnim 3s ease forwards}
@keyframes introAnim{
0%{opacity:0;transform:scale(0.8);filter:blur(10px)}
50%{opacity:1;transform:scale(1.05);filter:blur(0)}
100%{opacity:1;transform:scale(1)}
}

/* TEXT */
section{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.logo{width:240px;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(212,175,55,0.4))}
h1{font-family:'Playfair Display',serif;font-size:64px;letter-spacing:6px;margin-bottom:20px}
.tagline{opacity:0.8;margin-bottom:30px;letter-spacing:2px}

/* FORM */
input{width:100%;padding:14px;border-radius:30px;border:none;margin-bottom:15px}
button{width:100%;padding:14px;border-radius:30px;border:none;background:#d4af37;color:#000;font-weight:bold}

/* SOCIAL */
.social-bar{position:fixed;top:50%;left:20px;transform:translateY(-50%);display:flex;flex-direction:column;gap:14px}
.social-bar a{width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.08);color:#fff;transition:.3s}
.social-bar a:hover{background:#d4af37;transform:scale(1.1)}

/* BUTTON */
.mail-fab{position:fixed;bottom:30px;right:30px;padding:14px 22px;border-radius:40px;background:#d4af37;color:#000;font-weight:600;text-decoration:none}

/* CURSOR */
.cursor{position:fixed;width:120px;height:120px;background:radial-gradient(circle, rgba(212,175,55,0.25), transparent);pointer-events:none;transform:translate(-50%,-50%)}
</style>

</head>

<body>

<!-- CURSOR -->

<div class="cursor" id="cursor"></div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<script>
// intro hide
setTimeout(()=>{document.querySelector('.intro').style.display='none'},3000);

// cursor glow
const c=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
c.style.left=e.clientX+'px';
c.style.top=e.clientY+'px';
});

// sound
const a=document.getElementById('ambient');
document.addEventListener('click',()=>{if(a.paused){a.volume=0.3;a.play()}});

// whisper
const w=document.getElementById('whisper');
setTimeout(()=>{w.volume=0.4;w.play().catch(()=>{})},1500);
</script>
