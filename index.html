<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAKTI — Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS STYLES */
        *{margin:0;padding:0;box-sizing:border-box} 
        body{ background:#000; color:#fff; font-family:'Inter', sans-serif; overflow-x:hidden; } 
        body[dir="rtl"]{font-family:'Cairo', sans-serif} 

        /* VIDEO & OVERLAY */
        video{ position:fixed; width:100%; height:100%; object-fit:cover; z-index:-2; } 
        .overlay{ position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:-1; } 

        /* INTRO */
        .intro{ 
            position:fixed; width:100%;height:100%; 
            display:flex;align-items:center;justify-content:center; 
            background:#000; z-index:9999; cursor:pointer; 
            font-family:'Playfair Display'; font-size:24px; 
            letter-spacing:6px; transition:opacity 0.8s ease; 
        } 
        .intro.hide{opacity:0;pointer-events:none} 

        /* LOGO */
        .logo-wrap{ 
            position:relative; margin-bottom:20px; 
            transition:.5s; z-index:1000; 
            animation: floatWrap 6s ease-in-out infinite; 
        } 
        .logo-wrap.small{ 
            position:fixed; top:12px; left:50%; 
            transform:translateX(-50%) scale(.5); opacity:.75; 
        } 
        .logo{ 
            width:200px; display:block; 
            animation: logoReveal 1.8s ease forwards, heartbeatGlow 8s infinite; 
        } 

        @keyframes logoReveal{ from{opacity:0;transform:scale(.6)} to{opacity:1;transform:scale(1)} } 
        @keyframes floatWrap{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} } 
        @keyframes heartbeatGlow{ 
            0%,92%,100%{filter:drop-shadow(0 0 0 rgba(212,175,55,0))} 
            95%{ filter:drop-shadow(0 0 12px rgba(212,175,55,0.6)) drop-shadow(0 0 25px rgba(212,175,55,0.3)); } 
        } 

        .logo:hover{ filter:drop-shadow(0 0 20px rgba(212,175,55,0.8)); } 

        /* TEXT */
        h1{ font-family:'Playfair Display'; font-size:44px; letter-spacing:5px; margin-bottom: 10px; } 
        .tag{opacity:.7;margin-top:10px; font-size: 18px; letter-spacing: 2px;} 

        /* SECTION */
        section{ height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding: 20px; } 

        /* EMAIL BOX */
        .box{ 
            background:rgba(255,255,255,0.06); padding:40px; 
            border-radius:20px; backdrop-filter:blur(12px); 
            border: 1px solid rgba(212,175,55,0.2);
            max-width: 400px; width: 100%;
        } 
        input{ 
            width:100%; padding:14px; border-radius:25px; 
            border:1px solid rgba(255,255,255,0.2); margin-top:15px; 
            background: rgba(0,0,0,0.3); color: #fff; text-align: center;
        } 
        button#btn{ 
            width:100%; padding:14px; border-radius:25px; 
            border:none; background:#d4af37; color:#000; 
            margin-top:15px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        } 
        button#btn:hover{ background: #f1c40f; transform: scale(1.02); }

        /* CONTROLS */
        .ctrl{ position:fixed; top:20px; right:20px; z-index:3000; } 
        .ctrl button{ 
            width:45px;height:45px; border-radius:50%; 
            background:#d4af37; color:#000; border:none; 
            margin-left:8px; cursor:pointer; font-weight: bold;
        } 

        /* LIGHT EFFECT */
        .light{ 
            position:fixed; width:250px;height:250px; 
            border-radius:50%; background:radial-gradient(circle,rgba(212,175,55,0.15),transparent 70%); 
            pointer-events:none; transform:translate(-50%,-50%); 
            opacity:0; z-index:2000; transition: opacity 0.3s;
        } 

        /* REVEAL ANIMATION */
        .reveal{opacity:0;transform:translateY(30px);transition:1.2s ease-out} 
        .reveal.show{opacity:1;transform:translateY(0)} 

        /* MOBILE */
        @media (max-width:768px){ 
            .logo{width:140px} 
            h1{font-size:32px} 
        }
    </style>
</head>
<body>

    <div class="intro" id="intro">TAP TO BEGIN</div>

    <video id="ambient-video" autoplay muted loop playsinline>
        <source src="your-video-file.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="ctrl">
        <button id="lang">AR</button>
        <button id="mute">🔊</button>
    </div>

    <section>
        <div class="content">
            <div class="logo-wrap" id="logoWrap">
                <img src="your-logo.png" alt="SHAKTI" class="logo" id="mainLogo">
            </div>
            
            <div class="reveal">
                <h1 id="title">SHAKTI</h1>
                <p class="tag" id="tag">COMING SOON — THE RITUAL BEGINS</p>
            </div>

            <div class="box reveal" style="margin-top: 40px;">
                <h3 id="join">Join the Ritual</h3>
                <input type="email" id="mailInput" placeholder="Enter your email">
                <button id="btn">Request Access</button>
            </div>
        </div>
    </section>

    <audio id="ambient-audio" loop>
        <source src="ambient-sound.mp3" type="audio/mpeg">
    </audio>
    <audio id="whisper-audio">
        <source src="whisper-sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const intro = document.getElementById('intro');
        const ambient = document.getElementById('ambient-audio');
        const whisper = document.getElementById('whisper-audio');
        const logoWrap = document.getElementById('logoWrap');
        const muteBtn = document.getElementById('mute');
        const langBtn = document.getElementById('lang');
        const tag = document.getElementById('tag');
        const join = document.getElementById('join');
        const btn = document.getElementById('btn');
        const mailInput = document.getElementById('mailInput');

        // LIGHT EFFECT
        const light = document.createElement('div');
        light.className = 'light';
        document.body.appendChild(light);

        document.onmousemove = e => {
            light.style.opacity = 1;
            light.style.left = e.clientX + 'px';
            light.style.top = e.clientY + 'px';
        }

        document.addEventListener('touchmove', e => {
            light.style.opacity = 1;
            light.style.left = e.touches[0].clientX + 'px';
            light.style.top = e.touches[0].clientY + 'px';
        });

        // INTRO CLICK
        intro.onclick = () => {
            intro.classList.add('hide');
            setTimeout(() => intro.style.display = "none", 800);
            
            // Start Audio
            ambient.volume = 0.3;
            ambient.play().catch(e => console.log("Audio play blocked"));
            setTimeout(() => whisper.play().catch(e => {}), 700);
        }

        // HEARTBEAT LOGIC
        let isMuted = false;
        function heartbeat() {
            if (!isMuted) {
                whisper.currentTime = 0;
                whisper.volume = 0.2;
                whisper.play().catch(e => {});
            }
        }
        setTimeout(heartbeat, 4000);
        setInterval(heartbeat, 8000);

        // SCROLL EFFECT
        window.onscroll = () => {
            if (window.scrollY > 100) logoWrap.classList.add('small');
            else logoWrap.classList.remove('small');
        }

        // REVEAL ON SCROLL
        const obs = new IntersectionObserver(entries => {
            entries.forEach(el => {
                if (el.isIntersecting) el.target.classList.add('show');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

        // MUTE TOGGLE
        muteBtn.onclick = () => {
            isMuted = !isMuted;
            ambient.muted = isMuted;
            whisper.muted = isMuted;
            muteBtn.innerText = isMuted ? '🔇' : '🔊';
        }

        // LANGUAGE TOGGLE
        let currentLang = 'en';
        langBtn.onclick = () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            
            if(currentLang === 'ar') {
                tag.innerText = 'قريباً — الطقس يبدأ';
                join.innerText = 'انضم الآن';
                btn.innerText = 'اطلب الوصول';
                mailInput.placeholder = 'أدخل بريدك الإلكتروني';
                document.body.dir = 'rtl';
                langBtn.innerText = 'EN';
            } else {
                tag.innerText = 'COMING SOON — THE RITUAL BEGINS';
                join.innerText = 'Join the Ritual';
                btn.innerText = 'Request Access';
                mailInput.placeholder = 'Enter your email';
                document.body.dir = 'ltr';
                langBtn.innerText = 'AR';
            }
        }
    </script>
</body>
</html>
