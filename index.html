<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHAKTI — Ritual of Radiance</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preload" as="video" href="video.mp4">
<link rel="preload" as="image" href="shakti_logo_clean_glow.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}
body[dir="rtl"]{font-family:'Cairo',sans-serif}

/* INTRO */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  cursor:pointer;
  transition:1s;
}
.touch-intro.hide{opacity:0;pointer-events:none}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.5), #000);
  z-index:-1;
}

/* LOGO FLOAT */
.logo-wrap{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  transition:0.6s ease;
  z-index:1000;
}
.logo-wrap.small{
  top:15px;
  transform:translateX(-50%) scale(0.5);
}

.logo{
  width:220px;
  opacity:0;
  transform:scale(0.7);
  filter:blur(10px);
  animation:logoReveal 2s ease forwards paused, pulse 6s infinite 2s;
}

@keyframes logoReveal{
  0%{opacity:0;transform:scale(0.7);filter:blur(10px)}
  100%{opacity:1;transform:scale(1);filter:blur(0)}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.03)}
}

/* TEXT */
h1{font-family:'Playfair Display';font-size:48px}
.tagline{opacity:0.8}

/* SECTIONS */
section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* EMAIL */
.email-box{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  max-width:350px;
}

input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  margin-top:20px;
}

button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#d4af37;
  color:#000;
  margin-top:10px;
}

/* SOCIAL */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
}
.social-bar a{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.05);
}
.social-bar svg{
  width:22px;height:22px;fill:#d4af37;
}

/* CONTROLS */
.controls{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}
.control-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(212,175,55,0.2)!important;
  color:#d4af37!important;
  border:none;outline:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-appearance:none;
}

/* MAIL */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  color:#000;
  padding:12px 18px;
  border-radius:30px;
  text-decoration:none;
}

/* LIGHT */
.finger-light{
  position:fixed;
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
  opacity:0;
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:1.2s ease;
}
.reveal.show{
  opacity:1;
  transform:translateY(0);
}
</style>

</head>

<body>

<div class="touch-intro" id="intro">Tap to Begin</div>

<div class="controls">
  <button class="control-btn" id="soundToggle">🔊</button>
  <button class="control-btn" id="langBtn">EN</button>
</div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<video autoplay muted loop playsinline>
  <source src="video.mp4">
</video>

<div class="overlay"></div>

<div class="logo-wrap" id="logoWrap">
  <img src="shakti_logo_clean_glow.png" class="logo">
</div>

<section>
  <div class="reveal">
    <h1>SHAKTI</h1>
    <p id="taglineText" class="tagline">COMING SOON — THE RITUAL BEGINS</p>
  </div>
</section>

<section>
  <div class="email-box reveal">
    <h2 id="joinText">Join the Ritual</h2>
    <input id="emailInput" type="email" placeholder="Enter your email">
    <button id="btnText">Request Access</button>
  </div>
</section>

<div class="social-bar">
<a href="https://www.youtube.com/@SHAKTIBEAUTY"><svg viewBox="0 0 24 24"><path d="M23.498 6.186..."/></svg></a>
<a href="https://www.facebook.com/Shaktibeauty.co"><svg viewBox="0 0 24 24"><path d="M22 12a10..."/></svg></a>
</div>

<a href="mailto:hello@shakti.beauty" class="mail-fab">Email</a>

<script>

// LIGHT
const light=document.createElement('div');
light.className='finger-light';
document.body.appendChild(light);

document.addEventListener('mousemove',(e)=>{
  light.style.opacity=1;
  light.style.left=e.clientX+'px';
  light.style.top=e.clientY+'px';
});

// INTRO
intro.onclick=()=>{
  if(navigator.vibrate) navigator.vibrate(10);

  intro.classList.add('hide');

  ambient.volume=0.3;
  ambient.play();

  setTimeout(()=>{
    whisper.play();
  },800);

  setTimeout(()=>{
    document.querySelector('.logo').style.animationPlayState='running';
  },600);
};

// SOUND
let muted=false;
soundToggle.onclick=()=>{
  muted=!muted;
  ambient.muted=muted;
  whisper.muted=muted;
  soundToggle.innerText=muted?'🔇':'🔊';
};

// LANGUAGE
const data={
en:{tag:"COMING SOON — THE RITUAL BEGINS",join:"Join the Ritual",btn:"Request Access",email:"Enter your email"},
ar:{tag:"قريباً — الطقس يبدأ",join:"انضم الآن",btn:"اطلب الوصول",email:"أدخل بريدك"},
es:{tag:"PRÓXIMAMENTE",join:"Únete",btn:"Acceso",email:"Correo"}
};
let lang="en";
langBtn.onclick=()=>{
  lang=lang==="en"?"ar":lang==="ar"?"es":"en";
  taglineText.innerText=data[lang].tag;
  joinText.innerText=data[lang].join;
  btnText.innerText=data[lang].btn;
  emailInput.placeholder=data[lang].email;
  document.body.dir=lang==="ar"?"rtl":"ltr";
  langBtn.innerText=lang.toUpperCase();
};

// REVEAL
const observer=new IntersectionObserver(e=>{
  e.forEach(el=>{if(el.isIntersecting)el.target.classList.add('show')});
});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

// FLOAT LOGO
window.addEventListener('scroll',()=>{
  if(window.scrollY>100){
    logoWrap.classList.add('small');
  }else{
    logoWrap.classList.remove('small');
  }
});

</script>

</body>
</html>
