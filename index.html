<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHAKTI — Ritual of Radiance</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preload" as="video" href="video.mp4">
<link rel="preload" as="image" href="shakti_logo_clean_glow.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

body[dir="rtl"]{
  font-family:'Cairo',sans-serif;
}

/* INTRO */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  cursor:pointer;
  transition:1s;
}
.touch-intro.hide{opacity:0;pointer-events:none}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.4), #000);
  z-index:-1;
}

/* HERO */
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

/* LOGO */
.logo{
  width:220px;
  opacity:0;
  transform:scale(0.7);
  filter:blur(8px);
  animation:logoReveal 2s ease forwards;
}

@keyframes logoReveal{
  0%{opacity:0;transform:scale(0.7);filter:blur(8px)}
  50%{opacity:1;transform:scale(1.05)}
  100%{opacity:1;transform:scale(1);filter:blur(0)}
}

/* TEXT */
h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
}

.tagline{
  opacity:0.8;
}

/* SECTIONS */
section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* EMAIL BOX */
.email-box{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  max-width:350px;
}

input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  margin-top:20px;
}

button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#d4af37;
  color:#000;
  margin-top:10px;
  font-weight:bold;
}

/* SOCIAL */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.social-bar a{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

.social-bar svg{
  width:22px;
  height:22px;
  fill:#d4af37;
}

.social-bar a:hover{
  transform:scale(1.2);
  box-shadow:0 0 15px rgba(212,175,55,0.6);
}

/* CONTROLS */
.controls{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
  z-index:999;
}

.control-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(212,175,55,0.15) !important;
  color:#d4af37 !important;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:none;
  outline:none;
  appearance:none;
}

.control-btn:focus,
.control-btn:active{
  outline:none !important;
  box-shadow:none !important;
}

/* FLOAT BUTTON */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  color:#000;
  padding:12px 18px;
  border-radius:30px;
}
</style>

</head>

<body>

<div class="touch-intro" id="intro">Tap to Begin</div>

<div class="controls">
  <button class="control-btn" id="soundToggle">🔊</button>
  <button class="control-btn" id="langBtn">EN</button>
</div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<video autoplay muted loop playsinline>
  <source src="video.mp4">
</video>

<div class="overlay"></div>

<section>
  <div class="hero">
    <img src="shakti_logo_clean_glow.png" class="logo">
    <h1>SHAKTI</h1>
    <p class="tagline" id="taglineText">COMING SOON — THE RITUAL BEGINS</p>
  </div>
</section>

<section>
  <div class="email-box">
    <h2 id="joinText">Join the Ritual</h2>
    <input id="emailInput" type="email" placeholder="Enter your email">
    <button id="btnText">Request Access</button>
  </div>
</section>

<!-- SOCIAL -->

<div class="social-bar">

<a href="https://www.youtube.com/@SHAKTIBEAUTY" target="_blank">
<svg viewBox="0 0 24 24"><path d="M23.498 6.186a2.997 2.997 0 0 0-2.109-2.122C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.389.564A2.997 2.997 0 0 0 .502 6.186A31.29 31.29 0 0 0 0 12a31.29 31.29 0 0 0 .502 5.814 2.997 2.997 0 0 0 2.109 2.122C4.495 20.5 12 20.5 12 20.5s7.505 0 9.389-.564a2.997 2.997 0 0 0 2.109-2.122A31.29 31.29 0 0 0 24 12a31.29 31.29 0 0 0-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
</a>

<a href="https://x.com/SHAKTI_BEAUTY" target="_blank">
<svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.2 9.46 12.647h-7.406l-5.805-7.67-6.713 7.67H.398l8.6-9.834L0 1.153h7.594l5.243 6.932 6.064-6.932z"/></svg>
</a>

<a href="https://www.instagram.com/shaktibeauty.co" target="_blank">
<svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7z"/></svg>
</a>

<a href="https://www.facebook.com/Shaktibeauty.co" target="_blank">
<svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.5 9.87v-6.99H8.1V12h2.4V9.8z"/></svg>
</a>

</div>

<script>

// INTRO
intro.onclick=()=>{
  intro.classList.add('hide');
  ambient.play().catch(()=>{});
  whisper.play().catch(()=>{});
};

// SOUND
let muted=false;
soundToggle.onclick=()=>{
  muted=!muted;
  ambient.muted=muted;
  whisper.muted=muted;
  soundToggle.innerText=muted?'🔇':'🔊';
};

// LANGUAGE
const data={
en:{
  tagline:"COMING SOON — THE RITUAL BEGINS",
  join:"Join the Ritual",
  btn:"Request Access",
  email:"Enter your email"
},
ar:{
  tagline:"قريباً — الطقس يبدأ",
  join:"انضم الآن",
  btn:"اطلب الوصول",
  email:"أدخل بريدك"
},
es:{
  tagline:"PRÓXIMAMENTE — EL RITUAL COMIENZA",
  join:"Únete al ritual",
  btn:"Solicitar acceso",
  email:"Introduce tu correo"
}
};

let lang="en";

langBtn.onclick=()=>{
  lang = lang==="en"?"ar":lang==="ar"?"es":"en";

  taglineText.innerText=data[lang].tagline;
  joinText.innerText=data[lang].join;
  btnText.innerText=data[lang].btn;
  emailInput.placeholder=data[lang].email;

  document.body.dir = lang==="ar"?"rtl":"ltr";
  langBtn.innerText=lang.toUpperCase();
};

</script>

</body>
</html>
