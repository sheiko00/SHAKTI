<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* INTRO */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  font-size:18px;
  cursor:pointer;
  transition:1s;
}
.touch-intro.hide{
  opacity:0;
  pointer-events:none;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  will-change:transform;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), #000);
  z-index:-1;
  will-change:transform;
}

/* LOGO */
.logo{
  width:220px;
  margin-bottom:20px;
  animation:pulse 6s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(212,175,55,0.35));
  will-change:transform;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.03)}
}

/* TEXT */
section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
  letter-spacing:4px;
}

.tagline{
  opacity:0.8;
  margin-top:15px;
}

/* FORM */
input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  margin-top:20px;
}

button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#d4af37;
  color:#000;
  margin-top:10px;
  font-weight:bold;
}

/* SOCIAL */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.social-bar a{
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.social-bar svg{
  width:20px;
  height:20px;
  fill:#d4af37;
}

/* HOVER */
.social-bar a:hover,
.social-bar a:active{
  transform:scale(1.2);
  background:rgba(212,175,55,0.15);
  box-shadow:
    0 0 15px rgba(212,175,55,0.5),
    0 0 30px rgba(212,175,55,0.2);
}

.social-bar a:hover svg,
.social-bar a:active svg{
  filter:drop-shadow(0 0 8px #d4af37);
}

/* BUTTON */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 18px;
  border-radius:40px;
  background:#d4af37;
  color:#000;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  h1{font-size:34px}
  .logo{width:160px}
}
</style>

<script>

// INTRO
const intro=document.getElementById('intro');

function enterSite(){
  intro.classList.add('hide');

  ambient.volume=0.3;
  ambient.play().catch(()=>{});

  whisper.volume=0.9;
  whisper.play().catch(()=>{});
}

intro.addEventListener('click', enterSite);
intro.addEventListener('touchstart', enterSite);

// PERFORMANCE SCROLL
let ticking=false;

window.addEventListener('scroll',()=>{
  if(!ticking){
    requestAnimationFrame(()=>{
      document.querySelectorAll('.overlay').forEach((el,i)=>{
        el.style.transform=`translateY(${window.scrollY*0.02}px)`;
      });
      ticking=false;
    });
    ticking=true;
  }
});

</script>
