<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAKTI — Ritual of Radiance</title>

<!-- PRELOAD -->

<link rel="preload" as="video" href="video.mp4" type="video/mp4">
<link rel="preload" as="image" href="shakti_logo_clean_glow.png">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-32x32.png">
<link rel="manifest" href="site.webmanifest">

<!-- FONTS -->

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* Arabic */
body[dir="rtl"]{
  font-family:'Cairo',sans-serif;
}

/* INTRO */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  cursor:pointer;
  transition:1s;
}
.touch-intro.hide{
  opacity:0;
  pointer-events:none;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), #000);
  z-index:-1;
}

/* LOGO */
.logo{
  width:220px;
  animation:pulse 6s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(212,175,55,0.35));
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.03)}
}

section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
}

.tagline{
  margin-top:15px;
  opacity:0.8;
}

/* SOCIAL */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.social-bar a{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.social-bar svg{
  width:20px;
  fill:#d4af37;
}

.social-bar a:hover,
.social-bar a:active{
  transform:scale(1.2);
  box-shadow:0 0 15px rgba(212,175,55,0.5);
}

/* BUTTON */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 18px;
  border-radius:40px;
  background:#d4af37;
  color:#000;
  text-decoration:none;
}

/* LANGUAGE */
.lang-switcher{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
}

.lang-current{
  padding:10px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  color:#d4af37;
  cursor:pointer;
}

.lang-menu{
  display:none;
  margin-top:10px;
  flex-direction:column;
}

.lang-menu div{
  padding:8px;
  cursor:pointer;
}

/* SOUND */
.sound-toggle{
  position:fixed;
  top:20px;
  right:70px;
  width:38px;
  height:38px;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#d4af37;
}

/* MOBILE */
@media(max-width:768px){
  h1{font-size:32px}
}
</style>

</head>

<body>

<div class="touch-intro" id="intro">Tap to Begin</div>

<div class="lang-switcher">
  <div class="lang-current">EN</div>
  <div class="lang-menu">
    <div data-lang="en">EN</div>
    <div data-lang="ar">AR</div>
    <div data-lang="es">ES</div>
  </div>
</div>

<div class="sound-toggle" id="soundToggle">🔊</div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<video autoplay muted loop playsinline preload="metadata">
  <source src="video.mp4">
</video>

<div class="overlay"></div>

<section>
  <div>
    <img src="shakti_logo_clean_glow.png" class="logo">
    <h1>SHAKTI</h1>
    <p class="tagline">COMING SOON — THE RITUAL BEGINS</p>
  </div>
</section>

<section id="join">
  <div>
    <h1>Join the Ritual</h1>
    <input type="email" placeholder="Enter your email">
    <button>Request Access</button>
  </div>
</section>

<div class="social-bar">
<a href="#"><svg viewBox="0 0 24 24"><path d="M23.5..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M18.9..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M7..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M22..."/></svg></a>
</div>

<script>

// INTRO
function enterSite(){
  intro.classList.add('hide');
  ambient.play().catch(()=>{});
  whisper.play().catch(()=>{});
}
intro.addEventListener('click',enterSite);
intro.addEventListener('touchstart',enterSite);

// LANGUAGE
const translations={
en:{tag:"COMING SOON — THE RITUAL BEGINS",join:"Join the Ritual"},
ar:{tag:"قريباً — الطقس يبدأ",join:"انضم"},
es:{tag:"PRÓXIMAMENTE",join:"Únete"}
};

document.querySelectorAll('.lang-menu div').forEach(el=>{
  el.onclick=()=>{
    const l=el.dataset.lang;
    document.querySelector('.tagline').innerText=translations[l].tag;
    document.querySelector('#join h1').innerText=translations[l].join;
    document.body.dir=l==='ar'?'rtl':'ltr';
  }
});

// SOUND
let muted=false;
soundToggle.onclick=()=>{
  muted=!muted;
  ambient.muted=muted;
  whisper.muted=muted;
  soundToggle.innerText=muted?'🔇':'🔊';
};

</script>

</body>
</html>
