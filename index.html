<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHAKTI — Ritual of Radiance</title>

<link rel="preload" as="video" href="video.mp4">
<link rel="preload" as="image" href="shakti_logo_clean_glow.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== INTRO ===== */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  cursor:pointer;
  transition:1s;
}
.touch-intro.hide{opacity:0;pointer-events:none}

/* ===== VIDEO ===== */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
  z-index:-1;
}

/* ===== LOGO ===== */
.logo-wrap{
  position:relative;
  margin-bottom:20px;
}

.logo{
  width:220px;
  animation:logoReveal 2.5s ease forwards, pulse 6s ease-in-out infinite 2.5s;
  filter:drop-shadow(0 0 12px rgba(212,175,55,0.4));
}

@keyframes logoReveal{
  0%{opacity:0;transform:scale(0.7);filter:blur(10px)}
  100%{opacity:1;transform:scale(1);filter:blur(0)}
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.03)}
}

/* ===== SECTIONS ===== */
section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* ===== TEXT FIX (logo فوق) ===== */
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

/* ===== EMAIL BOX ===== */
.email-box{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  max-width:350px;
}

/* ===== INPUT ===== */
input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  margin-top:20px;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#d4af37;
  color:#000;
  margin-top:10px;
  font-weight:bold;
}

/* ===== SOCIAL (FIXED SVG) ===== */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.social-bar a{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

.social-bar svg{
  width:20px;
  height:20px;
  fill:#d4af37;
}

.social-bar a:hover{
  transform:scale(1.2);
  box-shadow:0 0 15px rgba(212,175,55,0.6);
}

/* ===== SOUND (FIX GOLD) ===== */
.sound-toggle{
  position:fixed;
  top:20px;
  right:80px;
  width:38px;
  height:38px;
  border-radius:50%;
  background:rgba(212,175,55,0.2);
  color:#d4af37;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* ===== LANGUAGE (WORKING) ===== */
.lang-switcher{
  position:fixed;
  top:20px;
  right:20px;
  color:#d4af37;
  cursor:pointer;
  font-size:14px;
}

/* ===== FLOAT BUTTON ===== */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  color:#000;
  padding:12px 18px;
  border-radius:30px;
}
</style>

</head>

<body>

<div class="touch-intro" id="intro">Tap to Begin</div>

<div class="lang-switcher" id="langBtn">EN</div>
<div class="sound-toggle" id="soundToggle">🔊</div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<video autoplay muted loop playsinline>
  <source src="video.mp4">
</video>

<div class="overlay"></div>

<!-- HERO -->

<section>
  <div class="hero">
    <div class="logo-wrap">
      <img src="shakti_logo_clean_glow.png" class="logo">
    </div>
    <h1>SHAKTI</h1>
    <p class="tagline">COMING SOON — THE RITUAL BEGINS</p>
  </div>
</section>

<!-- EMAIL -->

<section>
  <div class="email-box">
    <h2 id="joinText">Join the Ritual</h2>
    <input id="emailInput" type="email" placeholder="Enter your email">
    <button id="btnText">Request Access</button>
  </div>
</section>

<!-- SOCIAL (FULL ICONS) -->

<div class="social-bar">

<a href="https://www.youtube.com/@SHAKTIBEAUTY">
<svg viewBox="0 0 24 24">
<path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.6 3.5 12 3.5 12 3.5s-7.6 0-9.4.6A3 3 0 0 0 .5 6.2A31.7 31.7 0 0 0 0 12a31.7 31.7 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.8.6 9.4.6 9.4.6s7.6 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.7 31.7 0 0 0 24 12zM9.8 15.5l6.2-3.5-6.2-3.5z"/>
</svg>
</a>

<a href="https://x.com/SHAKTI_BEAUTY">
<svg viewBox="0 0 24 24">
<path d="M18.9 2H22l-7.5 8.6L23 22h-6.8l-5.3-6.9L4.8 22H1.7l8-9.2L1 2h6.9l4.8 6.3z"/>
</svg>
</a>

<a href="https://www.instagram.com/shaktibeauty.co">
<svg viewBox="0 0 24 24">
<path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7z"/>
</svg>
</a>

<a href="https://www.facebook.com/Shaktibeauty.co">
<svg viewBox="0 0 24 24">
<path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5z"/>
</svg>
</a>

</div>

<script>

// INTRO
intro.onclick = ()=>{
  intro.classList.add('hide');
  ambient.play().catch(()=>{});
  whisper.play().catch(()=>{});
};

// SOUND FIX
let muted=false;
soundToggle.onclick=()=>{
  muted=!muted;
  ambient.muted=muted;
  whisper.muted=muted;
  soundToggle.innerText=muted?'🔇':'🔊';
};

// LANGUAGE FIX
const langData={
  en:{join:"Join the Ritual",btn:"Request Access",email:"Enter your email"},
  ar:{join:"انضم الآن",btn:"اطلب الوصول",email:"أدخل بريدك"},
  es:{join:"Únete",btn:"Acceso",email:"Introduce correo"}
};

let currentLang='en';

langBtn.onclick=()=>{
  currentLang = currentLang==='en'?'ar':currentLang==='ar'?'es':'en';

  joinText.innerText = langData[currentLang].join;
  btnText.innerText = langData[currentLang].btn;
  emailInput.placeholder = langData[currentLang].email;

  document.body.dir = currentLang==='ar'?'rtl':'ltr';
  langBtn.innerText = currentLang.toUpperCase();
};

</script>

</body>
</html>
