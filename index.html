<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAKTI — Ritual of Radiance</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-32x32.png">
<link rel="manifest" href="site.webmanifest">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* INTRO */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  font-size:18px;
  transition:1s;
}
.touch-intro.hide{
  opacity:0;
  pointer-events:none;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), #000);
  z-index:-1;
}

/* LOGO HEARTBEAT */
.logo{
  width:220px;
  margin-bottom:20px;
  animation:pulse 4s ease-in-out infinite;
  filter:drop-shadow(0 0 15px rgba(212,175,55,0.4));
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.04)}
}

/* TEXT */
section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
  letter-spacing:4px;
}

.tagline{
  opacity:0.8;
  margin-top:15px;
}

/* FORM */
input{width:100%;padding:14px;border-radius:30px;border:none;margin-top:20px}
button{width:100%;padding:14px;border-radius:30px;border:none;background:#d4af37;color:#000;margin-top:10px}

/* SOCIAL */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.social-bar a{
  width:46px;
  height:46px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  transition:.3s;
}

.social-bar svg{
  width:20px;
  fill:#d4af37;
}

.social-bar a:active{
  transform:scale(1.2);
  box-shadow:0 0 20px rgba(212,175,55,0.6);
}

/* FLOAT BUTTON */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 18px;
  border-radius:40px;
  background:#d4af37;
  color:#000;
  text-decoration:none;
}

/* LIGHT FOLLOW */
.finger-light{
  position:fixed;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(212,175,55,0.18), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9998;
  opacity:0;
  transition:opacity 0.3s;
}

/* MOBILE */
@media(max-width:768px){
  h1{font-size:34px}
  .logo{width:160px}
}
</style>

</head>

<body>

<!-- INTRO -->

<div class="touch-intro" id="intro">
  Tap to Begin
</div>

<!-- AUDIO -->

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<!-- VIDEO -->

<video autoplay muted loop playsinline class="layer">
  <source src="video.mp4">
</video>

<div class="overlay layer"></div>

<!-- MAIN -->

<section>
  <div>
    <img src="shakti_logo_clean_glow.png" class="logo">
    <h1>SHAKTI</h1>
    <p class="tagline">COMING SOON — THE RITUAL BEGINS</p>
  </div>
</section>

<section id="join">
  <div style="max-width:350px;">
    <h1>Join the Ritual</h1>
    <p class="tagline">Be the first to access SHAKTI before the world.</p>

```
<form action="https://formspree.io/f/xykbeeye" method="POST">
  <input type="email" name="email" placeholder="Enter your email" required>
  <button type="submit">Request Access</button>
</form>
```

  </div>
</section>

<!-- SOCIAL -->

<div class="social-bar">
  <a href="https://www.youtube.com/@SHAKTIBEAUTY">
    <svg viewBox="0 0 24 24"><path d="M23.5 6.2..."/></svg>
  </a>
  <a href="https://x.com/SHAKTI_BEAUTY">
    <svg viewBox="0 0 24 24"><path d="M18.9 2H22..."/></svg>
  </a>
  <a href="https://www.instagram.com/shaktibeauty.co">
    <svg viewBox="0 0 24 24"><path d="M7 2h10..."/></svg>
  </a>
  <a href="https://www.facebook.com/Shaktibeauty.co">
    <svg viewBox="0 0 24 24"><path d="M22 12..."/></svg>
  </a>
</div>

<a href="#join" class="mail-fab">Join the Ritual</a>

<script>

// INTRO
const intro=document.getElementById('intro');
intro.addEventListener('touchstart',()=>{
  intro.classList.add('hide');

  ambient.volume=0.3;
  ambient.play().catch(()=>{});

  whisper.volume=0.9;
  whisper.play().catch(()=>{});
});

// LIGHT FOLLOW
const light=document.createElement('div');
light.className='finger-light';
document.body.appendChild(light);

document.addEventListener('touchstart',()=>{
  light.style.opacity=1;
});
document.addEventListener('touchmove',e=>{
  light.style.left=e.touches[0].clientX+'px';
  light.style.top=e.touches[0].clientY+'px';
});
document.addEventListener('touchend',()=>{
  light.style.opacity=0;
});

// PARALLAX
window.addEventListener('scroll',()=>{
  document.querySelectorAll('.layer').forEach((el,i)=>{
    el.style.transform=`translateY(${window.scrollY*(0.02*(i+1))}px)`;
  });
});

</script>

</body>
</html>
