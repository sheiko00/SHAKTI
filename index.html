<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHAKTI — Ritual of Radiance</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preload" as="video" href="video.mp4">
<link rel="preload" as="image" href="shakti_logo_clean_glow.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}
body[dir="rtl"]{font-family:'Cairo',sans-serif}

/* ===== Z-INDEX SYSTEM (FIX) ===== */
:root{
  --z-video:-2;
  --z-overlay:-1;
  --z-content:1;
  --z-logo:1000;
  --z-ui:2000;
}

/* INTRO */
.touch-intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
  cursor:pointer;
  transition:1s;
}
.touch-intro.hide{opacity:0;pointer-events:none}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:var(--z-video);
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.5), #000);
  z-index:var(--z-overlay);
}

/* LOGO */
.logo-wrap{
  position:relative;
  margin-bottom:20px;
  transition:0.6s ease;
  z-index:var(--z-logo);
}

.logo-wrap.small{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%) scale(0.5);
  opacity:0.75;
  z-index:var(--z-logo);
}

.logo{
  width:220px;
  opacity:0;
  transform:scale(0.7);
  filter:blur(8px);
  animation:logoReveal 2s ease forwards paused, pulse 6s infinite 2s;
}

@keyframes logoReveal{
  0%{opacity:0;transform:scale(0.7);filter:blur(8px)}
  100%{opacity:1;transform:scale(1);filter:blur(0)}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.03)}
}

/* TEXT */
h1{
  font-family:'Playfair Display';
  font-size:48px;
  letter-spacing:6px;
}

.tagline{opacity:0.8}

/* SECTIONS */
section{
  position:relative;
  z-index:var(--z-content);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* EMAIL */
.email-box{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  max-width:350px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  margin-top:20px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#d4af37;
  color:#000;
  margin-top:10px;
}

/* SOCIAL (FIX) */
.social-bar{
  position:fixed;
  top:50%;
  left:15px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
  z-index:var(--z-ui);
}

.social-bar a{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.08);
}

.social-bar svg{
  width:22px;height:22px;
  fill:#d4af37;
}

/* CONTROLS */
.controls{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
  z-index:var(--z-ui);
}

.control-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(212,175,55,0.2)!important;
  color:#d4af37!important;
  border:none;
}

/* MAIL */
.mail-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  color:#000;
  padding:12px 18px;
  border-radius:30px;
  text-decoration:none;
  z-index:var(--z-ui);
}
</style>

</head>

<body>

<div class="touch-intro" id="intro">Tap to Begin</div>

<div class="controls">
  <button class="control-btn" id="soundToggle">🔊</button>
  <button class="control-btn" id="langBtn">EN</button>
</div>

<audio id="ambient" src="ambient.mp3" loop></audio> <audio id="whisper" src="whisper.mp3"></audio>

<video autoplay muted loop playsinline>
  <source src="video.mp4">
</video>

<div class="overlay"></div>

<section>
  <div>
    <div class="logo-wrap" id="logoWrap">
      <img src="shakti_logo_clean_glow.png" class="logo">
    </div>
    <h1>SHAKTI</h1>
    <p id="taglineText" class="tagline">COMING SOON — THE RITUAL BEGINS</p>
  </div>
</section>

<section>
  <div class="email-box">
    <h2 id="joinText">Join the Ritual</h2>
    <input id="emailInput" type="email" placeholder="Enter your email">
    <button id="btnText">Request Access</button>
  </div>
</section>

<!-- SOCIAL FIXED -->

<div class="social-bar">
<a href="https://www.youtube.com/@SHAKTIBEAUTY"><svg viewBox="0 0 24 24"><path d="M23.498 6.186..."/></svg></a>
<a href="https://www.facebook.com/Shaktibeauty.co"><svg viewBox="0 0 24 24"><path d="M22 12a10..."/></svg></a>
</div>

<a href="mailto:hello@shakti.beauty" class="mail-fab">Email</a>

<script>

// INTRO
intro.onclick=()=>{
  intro.classList.add('hide');
  ambient.play();
  setTimeout(()=>whisper.play(),800);
  setTimeout(()=>document.querySelector('.logo').style.animationPlayState='running',600);
};

// FLOAT FIX
window.addEventListener('scroll',()=>{
  if(window.scrollY>100){
    logoWrap.classList.add('small');
  }else{
    logoWrap.classList.remove('small');
  }
});

</script>

</body>
</html>
