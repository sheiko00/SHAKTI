<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAKTI — Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS STYLES */
        *{margin:0;padding:0;box-sizing:border-box} 
        body{ background:#000; color:#fff; font-family:'Inter', sans-serif; overflow-x:hidden; transition: background 0.5s; } 
        body[dir="rtl"]{font-family:'Cairo', sans-serif} 

        /* VIDEO */
        video#ambient-video{ position:fixed; width:100%; height:100%; object-fit:cover; z-index:-2; } 
        .overlay{ position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:-1; } 

        /* INTRO */
        .intro{ 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            display:flex; align-items:center; justify-content:center; 
            background:#000; z-index:9999; cursor:pointer; 
            font-family:'Playfair Display'; font-size:24px; 
            letter-spacing:6px; transition: opacity 0.8s ease, visibility 0.8s; 
        } 
        .intro.hide{opacity:0; visibility: hidden; pointer-events:none} 

        /* LOGO */
        .logo-wrap{ 
            position:relative; margin-bottom:20px; 
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index:1000; 
            animation: floatWrap 6s ease-in-out infinite; 
        } 
        .logo-wrap.small{ 
            position:fixed; top:20px; left:50%; 
            transform: translateX(-50%) scale(0.4); opacity:0.8; 
        } 
        .logo{ 
            width:180px; display:block; margin: 0 auto;
            animation: logoReveal 1.8s ease forwards, heartbeatGlow 8s infinite; 
        } 

        @keyframes logoReveal{ from{opacity:0;transform:scale(.6)} to{opacity:1;transform:scale(1)} } 
        @keyframes floatWrap{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} } 
        @keyframes heartbeatGlow{ 
            0%,92%,100%{filter:drop-shadow(0 0 0 rgba(212,175,55,0))} 
            95%{ filter:drop-shadow(0 0 15px rgba(212,175,55,0.6)); } 
        } 

        /* TEXT & SECTION */
        section{ height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; flex-direction: column; } 
        h1{ font-family:'Playfair Display'; font-size:54px; letter-spacing:8px; margin-bottom: 5px; color: #d4af37; } 
        .tag{opacity:0.6; font-size: 16px; letter-spacing: 3px; text-transform: uppercase;} 

        /* FORM BOX */
        .box{ 
            background:rgba(255,255,255,0.05); padding:30px; 
            border-radius:24px; backdrop-filter:blur(15px); 
            border: 1px solid rgba(212,175,55,0.15);
            max-width: 380px; width: 90%; margin-top: 40px;
        } 
        input{ 
            width:100%; padding:14px 20px; border-radius:30px; 
            border:1px solid rgba(255,255,255,0.1); margin-top:20px; 
            background: rgba(0,0,0,0.4); color: #fff; text-align: center; outline: none;
        } 
        #btn{ 
            width:100%; padding:14px; border-radius:30px; 
            border:none; background:#d4af37; color:#000; 
            margin-top:15px; cursor: pointer; font-weight: 700;
            transition: 0.3s; text-transform: uppercase;
        } 
        #btn:hover{ background: #fff; transform: translateY(-2px); }

        /* CONTROLS */
        .ctrl{ position:fixed; top:25px; right:25px; z-index:3000; display: flex; gap: 10px; } 
        .ctrl button{ 
            width:40px; height:40px; border-radius:50%; 
            background:rgba(212,175,55,0.9); color:#000; border:none; 
            cursor:pointer; font-weight: bold; display: flex; align-items:center; justify-content:center;
        } 

        /* MOUSE LIGHT */
        .light{ 
            position:fixed; width:300px; height:300px; 
            border-radius:50%; background:radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%); 
            pointer-events:none; transform:translate(-50%,-50%); 
            opacity:0; z-index:2000; transition: opacity 0.5s;
        } 

        /* REVEAL */
        .reveal{opacity:0; transform:translateY(20px); transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1);} 
        .reveal.show{opacity:1; transform:translateY(0)} 
    </style>
</head>
<body>

    <div class="intro" id="intro">TAP TO BEGIN</div>

    <video id="ambient-video" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-golden-liquid-waves-background-34502-large.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="ctrl">
        <button id="langBtn">AR</button>
        <button id="muteBtn">🔊</button>
    </div>

    <section>
        <div class="logo-wrap" id="logoWrap">
            <img src="https://cdn-icons-png.flaticon.com/512/3665/3665917.png" alt="SHAKTI" class="logo">
        </div>
        
        <div class="reveal">
            <h1 id="title">SHAKTI</h1>
            <p class="tag" id="tagText">COMING SOON — THE RITUAL BEGINS</p>
        </div>

        <div class="box reveal">
            <h3 id="joinTitle">Join the Ritual</h3>
            <input type="email" id="mailInput" placeholder="Enter your email">
            <button id="btn">Request Access</button>
        </div>
    </section>

    <script>
        // تحديد العناصر بعد تحميل الصفحة لضمان وجودها
        const intro = document.getElementById('intro');
        const logoWrap = document.getElementById('logoWrap');
        const muteBtn = document.getElementById('muteBtn');
        const langBtn = document.getElementById('langBtn');
        const tagText = document.getElementById('tagText');
        const joinTitle = document.getElementById('joinTitle');
        const btn = document.getElementById('btn');
        const mailInput = document.getElementById('mailInput');
        const video = document.getElementById('ambient-video');

        // تأثير الإضاءة مع الماوس
        const light = document.createElement('div');
        light.className = 'light';
        document.body.appendChild(light);

        document.addEventListener('mousemove', e => {
            light.style.opacity = 1;
            light.style.left = e.clientX + 'px';
            light.style.top = e.clientY + 'px';
        });

        // تشغيل الموقع عند الضغط على Intro
        intro.addEventListener('click', () => {
            intro.classList.add('hide');
            // محاولة تشغيل الفيديو بصوت إذا أردت (المتصفحات تمنع الصوت التلقائي)
            video.muted = false; 
        });

        // تغيير حجم اللوجو عند السكرول
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                logoWrap.classList.add('small');
            } else {
                logoWrap.classList.remove('small');
            }
        });

        // تأثير الظهور التدريجي (Intersection Observer)
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('show');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // كتم الصوت
        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            muteBtn.innerText = video.muted ? '🔇' : '🔊';
        });

        // تبديل اللغة
        let currentLang = 'en';
        langBtn.addEventListener('click', () => {
            currentLang = (currentLang === 'en') ? 'ar' : 'en';
            
            if(currentLang === 'ar') {
                tagText.innerText = 'قريباً — الطقس يبدأ';
                joinTitle.innerText = 'انضم إلى الطقوس';
                btn.innerText = 'اطلب الوصول';
                mailInput.placeholder = 'أدخل بريدك الإلكتروني';
                document.body.dir = 'rtl';
                langBtn.innerText = 'EN';
            } else {
                tagText.innerText = 'COMING SOON — THE RITUAL BEGINS';
                joinTitle.innerText = 'Join the Ritual';
                btn.innerText = 'Request Access';
                mailInput.placeholder = 'Enter your email';
                document.body.dir = 'ltr';
                langBtn.innerText = 'AR';
            }
        });
    </script>
</body>
</html>
