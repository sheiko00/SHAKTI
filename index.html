<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  color:#fff;
  background:#000;
  overflow-x:hidden;
}

section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

video{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
  z-index:-1;
}

.logo{
  width:240px;
  margin-bottom:20px;
  filter: drop-shadow(0 0 20px rgba(212,175,55,0.35));
}

h1{
  font-family:'Playfair Display',serif;
  font-size:64px;
  letter-spacing:6px;
  margin-bottom:20px;
}

.tagline{
  opacity:0.85;
  margin-bottom:30px;
  letter-spacing:2px;
}

.btn{
  padding:14px 40px;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:40px;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.btn:hover{
  background:#d4af37;
  border-color:#d4af37;
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 10px 30px rgba(212,175,55,0.5);
}

.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1.2s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

.intro{
  position:fixed;
  width:100%;height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.intro img{
  width:260px;
  animation:logoIntro 3s ease forwards;
}

@keyframes logoIntro{
  0%{opacity:0; transform:scale(0.8); filter:blur(10px)}
  50%{opacity:1; transform:scale(1.05); filter:blur(0)}
  100%{opacity:1; transform:scale(1)}
}



/* FLOATING SOCIAL BAR */
.social-bar{
  position:fixed;
  top:50%;
  left:20px;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:14px;
  z-index:999;
}

.social-bar a{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  color:#fff;
  text-decoration:none;
  font-size:12px;
  transition:0.3s;
}

.social-bar a svg{
  transition:0.3s;
}

.social-bar a:hover{
  background:#d4af37;
  transform:scale(1.12);
  box-shadow:0 0 20px rgba(212,175,55,0.6);
}

.social-bar a:hover svg{
  color:#000;
}

/* FLOATING EMAIL BUTTON */
.mail-fab{
  position:fixed;
  bottom:30px;
  right:30px;
  padding:14px 22px;
  border-radius:40px;
  background:#d4af37;
  color:#000;
  font-weight:600;
  text-decoration:none;
  box-shadow:0 10px 30px rgba(212,175,55,0.4);
  transition:0.3s;
  z-index:999;
}

.mail-fab:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 40px rgba(212,175,55,0.6);
}



/* PARTICLES BACKGROUND */
.particles span{
  position:fixed;
  width:4px;
  height:4px;
  background:rgba(212,175,55,0.3);
  border-radius:50%;
  animation:float 12s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh) scale(0)}
  to{transform:translateY(-10vh) scale(1)}
}



/* CURSOR GLOW */
.cursor-glow{
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* PARALLAX EFFECT */
.parallax{
  transform:translateZ(0);
  transition:transform 0.2s ease;
}

</style>

  </div>

  </div>

<!-- EMAIL COLLECTION -->
<section>
  <div class="fade" style="max-width:400px;">

    <form action="https://formspree.io/f/xykbeeye" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required style="width:100%;padding:14px;border-radius:30px;border:none;margin-bottom:15px;">
      <button type="submit" style="width:100%;padding:14px;border-radius:30px;border:none;background:#d4af37;color:#000;font-weight:bold;cursor:pointer;">Request Access</button>
    </form>
  </div>

<script>

// intro hide
setTimeout(()=>{
  document.querySelector('.intro').style.display='none';
},3200);

// scroll animation
const fades=document.querySelectorAll('.fade');
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});
fades.forEach(el=>observer.observe(el));



// CURSOR GLOW
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});

// SOUND ON FIRST CLICK (ambient)
const audio = document.getElementById('bgSound');
document.addEventListener('click', () => {
  if(audio.paused){ audio.volume = 0.3; audio.play(); }
});

// AI WHISPER INTRO (plays once after intro)
const whisper = document.getElementById('whisper');
setTimeout(()=>{
  whisper.volume = 0.4;
  whisper.play().catch(()=>{});
},1500);

// PARALLAX
window.addEventListener('scroll', () => {
  document.querySelectorAll('section').forEach((el, i) => {
    el.style.transform = `translateY(${window.scrollY * (0.02 * (i+1))}px)`;
  });
});

</script>
